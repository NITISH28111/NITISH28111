  <text x="309" y="635"><tspan class="stack-hi">PyTorch</tspan><tspan class="stack-dim"> · </tspan><tspan class="stack-hi">OpenCV</tspan><tspan class="stack-dim"> · </tspan><tspan class="stack-hi">PPO</tspan></text>
  <text x="309" y="654"><tspan class="stack-hi">ResNet-50</tspan><tspan class="stack-dim"> · </tspan><tspan class="stack-hi">MPRNet</tspan></text>

  <!-- Box 3: Networks -->
  <rect x="534" y="598" width="214" height="76" rx="6" class="stack-box"/>
  <text x="550" y="616" class="stack-label">NETWORKS &amp; SIM</text>
  <text x="550" y="635"><tspan class="stack-hi">ns-3</tspan><tspan class="stack-dim"> · </tspan><tspan class="stack-hi">Mininet</tspan><tspan class="stack-dim"> · </tspan><tspan class="stack-hi">iperf3</tspan></text>
  <text x="550" y="654"><tspan class="stack-hi">Wireshark</tspan><tspan class="stack-dim"> · Nmap · ZMap</tspan></text>

  <!-- Row 2: 3 boxes -->
  <!-- Box 4: Cybersecurity -->
  <rect x="52" y="688" width="214" height="76" rx="6" class="stack-box"/>
  <text x="68" y="706" class="stack-label">CYBERSECURITY</text>
  <text x="68" y="725"><tspan class="stack-hi">Burp Suite</tspan><tspan class="stack-dim"> · </tspan><tspan class="stack-hi">FTK Imager</tspan></text>
  <text x="68" y="744"><tspan class="stack-hi">Linux</tspan><tspan class="stack-dim"> · Arduino · RPi</tspan></text>

  <!-- Box 5: Design & 3D -->
  <rect x="293" y="688" width="214" height="76" rx="6" class="stack-box"/>
  <text x="309" y="706" class="stack-label">DESIGN &amp; 3D</text>
  <text x="309" y="725"><tspan class="stack-hi">SolidWorks</tspan><tspan class="stack-dim"> · </tspan><tspan class="stack-hi">Fusion 360</tspan></text>
  <text x="309" y="744"><tspan class="stack-dim">AutoCAD · Unity Hub · Figma</tspan></text>

  <!-- Box 6: Data & Tools -->
  <rect x="534" y="688" width="214" height="76" rx="6" class="stack-box"/>
  <text x="550" y="706" class="stack-label">DATA &amp; TOOLS</text>
  <text x="550" y="725"><tspan class="stack-hi">Tableau</tspan><tspan class="stack-dim"> · MS Office Suite</tspan></text>
  <text x="550" y="744"><tspan class="stack-dim">Research &amp; Analysis</tspan></text>

  <!-- ── RULE 4 ── -->
  <line x1="52" y1="792" x2="748" y2="792" class="rule"/>

  <!-- ── CONNECT ── -->
  <text x="52" y="822" class="link-text">N.Kumar122003@gmail.com</text>
  <line x1="52" y1="825" x2="222" y2="825" class="link-line"/>

  <text x="280" y="822" class="link-text">linkedin.com/in/nitish-kumar-csehons-isl</text>
