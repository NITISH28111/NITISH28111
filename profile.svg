<svg xmlns="http://www.w3.org/2000/svg" width="800" height="980" viewBox="0 0 800 980">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&amp;family=Syne:wght@400;700;800&amp;display=swap');

      .bg { fill: #0c0e0b; }
      .border { fill: none; stroke: #181c16; stroke-width: 1; }

      .name-main { font-family: 'Syne', sans-serif; font-size: 42px; font-weight: 800; fill: #eef0e8; letter-spacing: -1.5px; }
      .name-accent { font-family: 'Syne', sans-serif; font-size: 42px; font-weight: 800; fill: #a3b86c; letter-spacing: -1.5px; }
      .edu-text { font-family: 'JetBrains Mono', monospace; font-size: 10px; fill: #3d4438; letter-spacing: 2px; }

      .label { font-family: 'JetBrains Mono', monospace; font-size: 9px; fill: #2e3428; letter-spacing: 2px; }
      .role-text { font-family: 'JetBrains Mono', monospace; font-size: 13px; fill: #a3b86c; }
      .cursor { fill: #a3b86c; }
      .cursor2 { fill: #d4a865; }

      .proj-box { fill: #0a0c09; stroke: #181c16; stroke-width: 1; }
      .proj-accent { fill: #d4a865; }
      .proj-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; fill: #3d4438; letter-spacing: 2px; }
      .proj-name { font-family: 'JetBrains Mono', monospace; font-size: 13px; fill: #d4a865; font-weight: 500; }
      .proj-detail { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; fill: #5a6650; }
      .proj-tools { font-family: 'JetBrains Mono', monospace; font-size: 9.5px; fill: #3d4438; }

      .sec-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; fill: #a3b86c; letter-spacing: 3px; }
      .rule { stroke: #161a13; stroke-width: 1; }

      .code-box { fill: #0a0c09; stroke: #181c16; stroke-width: 1; }
      .code-kw { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #e06c4a; }
      .code-cn { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #c8d4a8; }
      .code-fn { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #d4a8c8; }
      .code-str { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #a3b86c; }
      .code-op { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #6a7a5a; }
      .code-cm { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #2e3428; }

      .stack-box { fill: #0a0c09; stroke: #181c16; stroke-width: 1; }
      .stack-label { font-family: 'JetBrains Mono', monospace; font-size: 8px; fill: #3d4438; letter-spacing: 2px; }
      .stack-hi { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; fill: #9aa88a; }
      .stack-dim { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; fill: #6a7a5a; }

      .link-text { font-family: 'JetBrains Mono', monospace; font-size: 10px; fill: #3d4438; letter-spacing: 1px; }
      .link-line { stroke: #1e241a; stroke-width: 1; }

      /* Role typing animation */
      .role-1, .role-2, .role-3, .role-4 { opacity: 0; }

      .role-1 {
        animation: roleShow 18s infinite;
        animation-delay: 0s;
      }
      .role-2 {
        animation: roleShow 18s infinite;
        animation-delay: 4.5s;
      }
      .role-3 {
        animation: roleShow 18s infinite;
        animation-delay: 9s;
      }
      .role-4 {
        animation: roleShow 18s infinite;
        animation-delay: 13.5s;
      }

      @keyframes roleShow {
        0%   { opacity: 0; }
        2%   { opacity: 1; }
        20%  { opacity: 1; }
        24%  { opacity: 0; }
        100% { opacity: 0; }
      }

      /* Project cycling animation - name/detail/tools in sync */
      .p1, .p2, .p3, .p4 { opacity: 0; }

      .p1 { animation: projShow 20s infinite 0s; }
      .p2 { animation: projShow 20s infinite 5s; }
      .p3 { animation: projShow 20s infinite 10s; }
      .p4 { animation: projShow 20s infinite 15s; }

      @keyframes projShow {
        0%   { opacity: 0; }
        3%   { opacity: 1; }
        22%  { opacity: 1; }
        25%  { opacity: 0; }
        100% { opacity: 0; }
      }

      /* Cursor blink */
      .cur { animation: blink 1s step-end infinite; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

      /* Slide in from left for each project */
      .p1 { animation: projSlide 20s infinite 0s; }
      .p2 { animation: projSlide 20s infinite 5s; }
      .p3 { animation: projSlide 20s infinite 10s; }
      .p4 { animation: projSlide 20s infinite 15s; }

      @keyframes projSlide {
        0%   { opacity: 0; transform: translateX(-8px); }
        4%   { opacity: 1; transform: translateX(0); }
        21%  { opacity: 1; transform: translateX(0); }
        25%  { opacity: 0; transform: translateX(4px); }
        100% { opacity: 0; }
      }

      @keyframes slideRole {
        0%   { opacity: 0; transform: translateX(-6px); }
        3%   { opacity: 1; transform: translateX(0); }
        21%  { opacity: 1; transform: translateX(0); }
        25%  { opacity: 0; }
        100% { opacity: 0; }
      }

      .role-1 { animation: slideRole 18s infinite 0s; }
      .role-2 { animation: slideRole 18s infinite 4.5s; }
      .role-3 { animation: slideRole 18s infinite 9s; }
      .role-4 { animation: slideRole 18s infinite 13.5s; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="980" rx="12" class="bg"/>
  <rect x="0.5" y="0.5" width="799" height="979" rx="11.5" class="border"/>

  <!-- ── NAME ── -->
  <text x="52" y="88" class="name-main">Nitish </text>
  <text x="178" y="88" class="name-accent">Kumar</text>

  <!-- edu -->
  <text x="52" y="110" class="edu-text">B.E.+M.E  ·  CSE (HONS.)  ·  INFORMATION SECURITY  ·  CHANDIGARH UNIVERSITY</text>

  <!-- ── RULE 1 ── -->
  <line x1="52" y1="130" x2="748" y2="130" class="rule"/>

  <!-- ── ROLE ANIMATION ── -->
  <text x="52" y="160" class="label">ROLE</text>

  <!-- role lines (crossfade) -->
  <text x="120" y="160" class="role-text role-1">Computer Vision Engineer</text>
  <text x="120" y="160" class="role-text role-2">Information Security Governance</text>
  <text x="120" y="160" class="role-text role-3">5G · Reinforcement Learning</text>
  <text x="120" y="160" class="role-text role-4">Building what matters.</text>
  <!-- cursor -->
  <rect x="120" y="148" width="7" height="14" class="cursor cur"/>

  <!-- ── PROJECT SHOWCASE BOX ── -->
  <rect x="52" y="182" width="696" height="108" rx="6" class="proj-box"/>
  <!-- left accent bar -->
  <rect x="52" y="182" width="3" height="108" rx="2" class="proj-accent"/>

  <text x="72" y="202" class="proj-label">RESEARCH  ·  CURRENT &amp; PAST</text>

  <!-- Project 1 -->
  <g class="p1">
    <text x="72" y="224" class="proj-name">STRATA-CC — Hierarchical RL for 5G Edge Networks</text>
    <text x="72" y="244" class="proj-detail">+27–36% link utilization  ·  −35–38% queue occupancy  ·  &lt;0.07% packet loss</text>
    <text x="72" y="262" class="proj-tools">Python · ns-3 · Mininet · PPO · HTB/tc · iperf3  ·  [ 2025–Present ]</text>
  </g>

  <!-- Project 2 -->
  <g class="p2">
    <text x="72" y="224" class="proj-name">AI Forensic Image Recovery Tool</text>
    <text x="72" y="244" class="proj-detail">~90% recovery rate  ·  96% CNN accuracy  ·  Springer ICCIS 2025</text>
    <text x="72" y="262" class="proj-tools">Python · PyTorch · MPRNet · ResNet-50 · PyQt5  ·  [ 2025 ]</text>
  </g>

  <!-- Project 3 -->
  <g class="p3">
    <text x="72" y="224" class="proj-name">Energilink UAV — Novel Battery Swap System</text>
    <text x="72" y="244" class="proj-detail">−50% downtime  ·  −20% battery consumption  ·  Patent No. 202411074253</text>
    <text x="72" y="262" class="proj-tools">C# · SolidWorks · Unity Hub · Tableau  ·  [ 2024 ]</text>
  </g>

  <!-- Project 4 -->
  <g class="p4">
    <text x="72" y="224" class="proj-name">SPIDRONE — Hybrid Aerial-Ground Robot</text>
    <text x="72" y="244" class="proj-detail">Quadcopter × Spider × Hexapod  ·  Spherical morphing  ·  Patent No. 202411080531</text>
    <text x="72" y="262" class="proj-tools">SolidWorks  ·  IIC Hackathon 3rd Place, Manipal Univ. Jaipur  ·  [ 2023 ]</text>
  </g>

  <!-- ── RULE 2 ── -->
  <line x1="52" y1="312" x2="748" y2="312" class="rule"/>

  <!-- ── WHOAMI ── -->
  <text x="52" y="336" class="sec-label">WHOAMI</text>

  <rect x="52" y="350" width="696" height="186" rx="6" class="code-box"/>

  <text x="72" y="376"><tspan class="code-kw">class </tspan><tspan class="code-cn">NitishKumar</tspan><tspan class="code-op">:</tspan></text>
  <text x="72" y="398"><tspan class="code-op">  </tspan><tspan class="code-fn">domain    </tspan><tspan class="code-op"> = </tspan><tspan class="code-str">"5G Networks · AI · Cybersecurity · Autonomous Systems"</tspan></text>
  <text x="72" y="420"><tspan class="code-op">  </tspan><tspan class="code-fn">languages </tspan><tspan class="code-op"> = </tspan><tspan class="code-str">["Python", "C/C++", "SQL", "C#"]</tspan></text>
  <text x="72" y="442"><tspan class="code-op">  </tspan><tspan class="code-fn">exploring </tspan><tspan class="code-op"> = </tspan><tspan class="code-str">"Hierarchical RL for adaptive 5G edge control"</tspan></text>
  <text x="72" y="464"><tspan class="code-op">  </tspan><tspan class="code-fn">building  </tspan><tspan class="code-op"> = </tspan><tspan class="code-str">"AI-assisted forensic image recovery pipelines"</tspan></text>
  <text x="72" y="486"><tspan class="code-op">  </tspan><tspan class="code-fn">designing </tspan><tspan class="code-op"> = </tspan><tspan class="code-str">"Novel UAV energy architectures"</tspan></text>
  <text x="72" y="508"><tspan class="code-cm">  # open to research collaboration</tspan></text>

  <!-- ── RULE 3 ── -->
  <line x1="52" y1="560" x2="748" y2="560" class="rule"/>

  <!-- ── TECH ARSENAL ── -->
  <text x="52" y="584" class="sec-label">TECH ARSENAL</text>

  <!-- Row 1: 3 boxes -->
  <!-- Box 1: Programming -->
  <rect x="52" y="598" width="214" height="76" rx="6" class="stack-box"/>
  <text x="68" y="616" class="stack-label">PROGRAMMING</text>
  <text x="68" y="635"><tspan class="stack-hi">Python</tspan><tspan class="stack-dim"> · </tspan><tspan class="stack-hi">C/C++</tspan></text>
  <text x="68" y="654"><tspan class="stack-hi">SQL</tspan><tspan class="stack-dim"> · </tspan><tspan class="stack-hi">C#</tspan></text>

  <!-- Box 2: AI/ML -->
  <rect x="293" y="598" width="214" height="76" rx="6" class="stack-box"/>
